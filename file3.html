<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 6 Math Quiz</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; line-height: 1.6; padding: 20px; background-color: #e8f4f8; }
        .quiz-container { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 20px; border: 3px solid #3498db; }
        h2 { color: #2c3e50; text-align: center; }
        .question-block { margin-bottom: 20px; padding: 15px; border-radius: 10px; background-color: #fff9db; }
        .question-text { font-weight: bold; font-size: 1.1em; margin-bottom: 10px; color: #d35400; }
        label { display: block; margin: 8px 0; cursor: pointer; padding: 10px; border: 2px solid transparent; border-radius: 8px; background: white; }
        label:hover { border-color: #f1c40f; }
        input[type="radio"] { transform: scale(1.2); margin-right: 10px; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; color: white; font-weight: bold; }
        .submit-btn { background: #27ae60; }
        .reset-btn { background: #e74c3c; }
        #results { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; text-align: center; font-size: 1.3em; background: #dff9fb; color: #130f40; border: 2px dashed #3498db; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Basic Math: Level 1</h2>

    <div class="question-block">
        <p class="question-text">1. Which integer is 3 units to the left of 0?</p>
        <label><input type="radio" name="q1" value="wrong"> 3</label>
        <label><input type="radio" name="q1" value="correct"> -3</label>
        <label><input type="radio" name="q1" value="wrong"> 0</label>
    </div>

    <div class="question-block">
        <p class="question-text">2. Solve: \( \frac{1}{4} + \frac{2}{4} \)</p>
        <label><input type="radio" name="q2" value="wrong"> \( \frac{3}{8} \)</label>
        <label><input type="radio" name="q2" value="correct"> \( \frac{3}{4} \)</label>
        <label><input type="radio" name="q2" value="wrong"> \( \frac{1}{4} \)</label>
    </div>

    <div class="question-block">
        <p class="question-text">3. If Set V = {a, e, i, o, u}, which is NOT an element of V?</p>
        <label><input type="radio" name="q3" value="wrong"> a</label>
        <label><input type="radio" name="q3" value="correct"> b</label>
        <label><input type="radio" name="q3" value="wrong"> e</label>
    </div>

    <div class="question-block">
        <p class="question-text">4. Which is the largest number?</p>
        <label><input type="radio" name="q4" value="wrong"> -10</label>
        <label><input type="radio" name="q4" value="wrong"> -1</label>
        <label><input type="radio" name="q4" value="correct"> 0</label>
    </div>

    <div class="question-block">
        <p class="question-text">5. Is \( \frac{1}{5} \) greater than or less than \( \frac{4}{5} \)?</p>
        <label><input type="radio" name="q5" value="correct"> Less than</label>
        <label><input type="radio" name="q5" value="wrong"> Greater than</label>
        <label><input type="radio" name="q5" value="wrong"> They are equal</label>
    </div>

    <div class="btn-group">
        <button class="submit-btn" onclick="check()">Check Score</button>
        <button class="reset-btn" onclick="resetQuiz()">Reset</button>
    </div>

    <div id="results"></div>
</div>

<script>
    function check() {
        let score = 0;
        const total = 5;
        for(let i=1; i<=total; i++) {
            let choice = document.querySelector(`input[name="q${i}"]:checked`);
            if(choice && choice.value === "correct") score++;
        }
        const res = document.getElementById('results');
        res.style.display = "block";
        res.innerHTML = `Great job! You got ${score} out of ${total} correct! 🌟`;
    }

    function resetQuiz() {
        const radios = document.querySelectorAll('input[type="radio"]');
        radios.forEach(r => r.checked = false);
        document.getElementById('results').style.display = "none";
    }
</script>

</body>
</html>
