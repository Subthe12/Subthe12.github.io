<!DOCTYPE html>
<html>
<head>
    <title>Geography Main Page</title>
    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #d5dfed;
            font-size: 24px;
            font-family: sans-serif;
            margin: 20px;
        }

        hr {
            border: none;
            height: 4px;
            background-color: #333;
        }

        header {
            position: relative;
            color: white;
            background-color: #B2AC88;
            border-radius: 30px;
            padding: 10px;
            z-index: 1;
            margin-bottom: 20px;
        }

        main {
            display: flex;
            background-color: rgb(255, 255, 255);
            border-radius: 30px;
            justify-content: space-around; /* Distributes the two boxes evenly */
            padding: 20px;
            gap: 20px;
        }

        /* Fixed selectors: added # for IDs */
        #a1, #a2 {
            background-color: #fae5d2;
            padding: 20px;
            border-radius: 20px;
            flex: 1; /* Makes both boxes equal width */
        }

        .ctext {
            text-decoration: none;
            color: #2c3e50;
            display: inline-block;
            margin-bottom: 8px;
        }

        .ctext:hover {
            text-decoration: underline;
        }

        #ctainer1 {
            margin-top: 30px;
            padding: 20px;
        }

        #car-select {
            padding: 10px;
            font-size: 18px;
            border-radius: 8px;
            width: 300px;
        }

        .description-box {
            margin-top: 20px;
            padding: 20px;
            background-color: white;
            border-radius: 15px;
            border: 2px solid #B2AC88;
            min-height: 50px;
            width: 90%; /* Responsive width */
            max-width: 600px;
            display: none;
        }
    </style>
    <link rel="icon" type="image/x-icon" href="favicon.jpg">
</head>

<body>

    <header>
        <h1 align="center">Summary</h1>
    </header>

    <main>
        <article id="a1">
            <h2>Chapters</h2>
            <a href="#" class="ctext">Topographical Sheet</a><br>
            <a href="index.html" class="ctext">Atmosphere</a><br>
            <a href="index.html" class="ctext">Weather and Climate</a><br>
            <a href="index.html" class="ctext">Weathering and Soil Formation</a>
        </article>

        <article id="a2">
            <h2>Quiz</h2>
            <a href="#" class="ctext">None Available</a><br>
            <a href="#" class="ctext">None Available</a><br>
            <a href="#" class="ctext">None Available</a><br>
            <a href="#" class="ctext">None Available</a>
        </article>
    </main>

    <div id="ctainer1">
        <h1>Brief Points</h1>
        <select id="car-select" onchange="showText()">
            <option value="">-- Select a Topic --</option>
            <option value="ts">Topographical Sheets</option>
            <option value="atsp">Atmosphere</option>
            <option value="wc">Weather and Climate</option>
            <option value="wac">Weathering and Soil Formation</option>
        </select>

        <div id="description" class="description-box"></div>
    </div>

    <script>
        function showText() {
            const selectElement = document.getElementById('car-select');
            const displayDiv = document.getElementById('description');
            const selectedValue = selectElement.value;

            const topicsInfo = {
                ts: "Topographical sheets (toposheets) are large-scale maps published by national agencies that depict detailed natural (relief, vegetation, water) and man-made (settlements, roads) features using standard symbols and contours.",
                atsp: "The atmosphere is a multi-layered blanket of gases surrounding Earth. It consists primarily of nitrogen (78%) and oxygen (21%), which regulate temperature and protect us from UV radiation.",
                wc: "Weather refers to short-term atmospheric conditions (like a rainy day), while Climate refers to the average weather patterns of a specific region over a long period of time (usually 30+ years).",
                wac: "Weathering is the breakdown of rocks into smaller particles through physical, chemical, and biological processes, which is the first step in creating soil."
            };

            if (selectedValue && topicsInfo[selectedValue]) {
                displayDiv.innerHTML = "<p>" + topicsInfo[selectedValue] + "</p>";
                displayDiv.style.display = "block";
            } else {
                displayDiv.style.display = "none";
            }
        }
    </script>
</body>
</html>
