		 <select id="car-select" onchange="showText()">
    <option value="ts">Topographical Sheets</option>
    <option value="atsp">Atmosphere</option>
	<option value="wc">Weather and Climate</option>
    <option value="wac">Weathering and Soil Formation</option>
  </select>

  <div id="description" class="description-box"></div>

	  <script>
    function showText() {
      const selectElement = document.getElementById('car-select');
      const displayDiv = document.getElementById('description');
      const selectedValue = selectElement.value;

      // Define the paragraphs for each car
      const carInfo = {
        ts: "Topographical sheets (toposheets) are large-scale maps published by national agencies, such as the Survey of India, that depict detailed natural (relief, vegetation, water) and man-made (settlements, roads, railways) features using standard conventional symbols,colors, and contours. They act as essential base maps for area analysis.",
        atsp: "The atmosphere is a protective, multi-layered blanket of gases surrounding Earth, held by gravity. It consists primarily of nitrogen () and oxygen (), which provide breathable air, regulate temperature, protect against harmful UV radiation, and facilitate the water cycle, creating a habitable environment.",
        wac: "Weathering is the breakdown of rocks and minerals into smaller particles (regolith) through physical, chemical, and biological processes, serving as the essential first step in soil formation.."
     	wc:"Weather is the short-term, day-to-day state of the atmosphere (rain, sun, wind). Climate is the long-term average of these weather patterns over 30+ years."
	  };

      if (selectedValue) {
        displayDiv.innerHTML = "<p>" + carInfo[selectedValue] + "</p>";
        displayDiv.style.display = "block"; // Make the box visible
      } else {
        displayDiv.style.display = "none"; // Hide if nothing is selected
      }
    }
  </script>
